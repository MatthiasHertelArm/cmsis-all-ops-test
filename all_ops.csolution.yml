#
# Standalone export of the ExecuTorch CMSIS-Pack all-ops test, covering both
# target variants:
#   * SSE-315  -- Corstone-315 (Cortex-M85, no NPU): the CPU project. Every
#                 operator the pack ships links + runs on the host core.
#   * SSE-320  -- Corstone-320 (Cortex-M85 + Ethos-U85): the delegated project.
#                 Every op is lowered through Vela; whatever partitions runs on
#                 the NPU, the rest falls back to the host core.
#
# The PyTorch::ExecuTorch pack is bundled under packs/ so this folder builds
# without a pre-installed pack. See README.md for build/run commands.

solution:
  created-for: CMSIS-Toolbox@2.14.1
  cdefault:
  compiler: GCC@14.3.1

  packs:
    - pack: ARM::CMSIS@>=6.0.0
    - pack: ARM::Cortex_DFP@>=1.1.0
    - pack: ARM::SSE_315_BSP@>=1.0.0
      for-context: +SSE-315
    - pack: ARM::SSE_320_BSP@>=1.0.0
      for-context: +SSE-320
    - pack: ARM::CMSIS-NN
    - pack: ARM::CMSIS-Compiler
    - pack: ARM::ethos-u-core-driver@>=1.25.2
      for-context: +SSE-320
    - pack: Keil::STM32H7xx_DFP@>=4.0.0
      for-context: +H7B3
    # Bundled ExecuTorch pack (this folder ships it under packs/).
    - pack: PyTorch::ExecuTorch@1.4.0-stage

  target-types:
    # Corstone-315 (Cortex-M85 host, no NPU): every non-delegated op runs here.
    - type: SSE-315
      device: ARM::SSE-315-FVP
      target-set:
        - set:
          images:
            - project-context: all_ops_cpu.Debug
    # Corstone-320 (Cortex-M85 host + Ethos-U85 NPU): the delegated variant.
    - type: SSE-320
      device: ARM::SSE-320-FVP
      target-set:
        - set:
          images:
            - project-context: all_ops_ethos_u.Debug

    # STM32H7B3I-DK (MB1332, STM32H7B3LIH6Q Cortex-M7): physical-board port of
    # the CPU variant. Same models/ops; UART1 (ST-Link VCP) instead of
    # semihosting, optimize: size to fit the 2 MB internal flash.
    - type: H7B3
      device: STMicroelectronics::STM32H7B3LIHxQ
      target-set:
        - set:
          images:
            - project-context: all_ops_h7b3.Release
          debugger:
            name: ST-Link@pyOCD
            clock: 4000000
            protocol: swd

    # Cortex-M0+ on the MPS2 FVP: Armv6-M has neither MVE nor DSP, so every
    # CMSIS-NN kernel takes the pure-C SCALAR path -- the third scratch-sizing
    # regime alongside Corstone (MVE) and the H7B3 board (DSP).
    - type: CM0plus
      device: ARM::ARMCM0P
      target-set:
        - set:
          images:
            - project-context: all_ops_m0plus.Release

  build-types:
    - type: Debug
      debug: on
      optimize: debug
    # Size-optimized build for real-silicon targets (the -O0 image is 6.3 MB;
    # the H7B3's internal flash is 2 MB).
    - type: Release
      debug: on
      optimize: size

  projects:
    # CPU project for Corstone-315; Ethos-U project for Corstone-320.
    - project: ./cpu/all_ops_cpu.cproject.yml
      for-context: +SSE-315
    - project: ./ethos_u/all_ops_ethos_u.cproject.yml
      for-context: +SSE-320
    - project: ./h7b3/all_ops_h7b3.cproject.yml
      for-context: +H7B3
    - project: ./m0plus/all_ops_m0plus.cproject.yml
      for-context: +CM0plus
